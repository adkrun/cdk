name: 😲 Issue report
description: Create a issue report to help us improve
labels: ["issue", "status/0-triage", "priority/p1"]
body:
  - type: markdown
    attributes:
      value: |
        **Thanks for helping us to improve cdk!**

        We welcome all issues reports. Please fill out each area of the form so we can better help you.
        If you are reporting, make sure that we do not have any duplicates already open.
        You can ensure this by searching the [issue list](https://github.com/adkrun/cdk/issues?q=is:issue+label:issue) for this repository.
        If there is a duplicate, please close your issue and add a comment to the existing issue instead.

        ---
  - type: textarea
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    attributes:
      label: How solve?
      description: Also tell us, how we can solve it?
      placeholder: Tell us how you see!
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Package platform
      description: Current supporting platforms
      options:
        - label: darwin/amd64 (macOS builds for x86_64 (Intel) architecture)
        - label: darwin/arm64 (macOS builds for Apple Silicon (M1/M2/M3+) architecture)
        - label: linux/amd64 (Linux builds for x86_64 architecture)
        - label: linux/arm64 (Linux builds for ARM64 (e.g., Raspberry Pi, Graviton) architecture)
        - label: windows/amd64 (Windows builds for x86_64 architecture)
        - label: windows/arm64 (Windows builds for ARM64 architecture)
    validations:
      required: true
  - type: textarea
    attributes:
      label: Checklist
      description: Also tell us, what did you do?
      value: |
        [ ] Finish implementation of the issue
        [ ] Test all functions
        [ ] Documentation
        [ ] Have enough logs to trace activities
        [ ] Notify developers of necessary actions
      render: markdown
    validations:
      required: true
  - type: textarea
    attributes:
      label: Anything else?
      description: |
        Links? References? Anything that will give us more context about the issue you are encountering!

        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: false
  - type: checkboxes
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/adkrun/cdk/blob/main/CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this repository Code of Conduct
          required: true
